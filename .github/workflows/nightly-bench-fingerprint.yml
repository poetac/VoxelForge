# Nightly SA physics-fingerprint sweep across all 7 canonical presets (#651).
#
# ADR-045 D1: cron 02:00 UTC Mon–Fri. Each preset runs in parallel on the
# two-runner pair via the reusable bench template (ADR-045 D3/D4).
# Diffs each current run against the most recent committed baseline;
# exits non-zero (artifact + failure annotation via template) if drift > 5%.
#
# Acceptance criteria (#651):
# - Scheduled workflow at this path                              ✓
# - Baselines refreshed at landing time (done by #674)          ✓
# - Drift summary: absolute vs. baseline (--bench-diff output)  ✓
# - Provenance per ADR-013 (VF_GIT_SHA / VF_MACHINE_ID env)    ✓
# - 30-day artifact retention (template default)                 ✓

name: Nightly Bench Fingerprint

on:
  schedule:
    - cron: '0 2 * * 1-5'   # 02:00 UTC Mon–Fri (ADR-045 D1)
  workflow_dispatch:

# Never cancel an in-progress nightly; let it finish. The github.workflow+ref
# key serializes THIS workflow's own repeated triggers (scheduled + manual)
# while still letting different bench workflows run in parallel (#851).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Rocket pillar (5 presets) ─────────────────────────────────────────────
  fingerprint-rocket-merlin:
    uses: ./.github/workflows/_scheduled-bench-template.yml
    with:
      bench-name: fingerprint-rocket-merlin
      bench-command: |
        mkdir -p current
        dotnet run --project Voxelforge.Benchmarks/Voxelforge.Benchmarks.csproj \
          --no-build --configuration Release \
          -- --bench-sa --design-preset merlin \
          --out current/bench-sa-merlin.jsonl
        if ! BASELINE=$(bash tools/pick-latest-baseline.sh "Voxelforge.Benchmarks/baselines/rocket/bench-sa-merlin-*.jsonl"); then
          echo "::error title=Missing baseline (merlin)::No committed baseline for bench-sa-merlin; nightly drift detection would be blind. Failing (see #850)."
          exit 1
        fi
        dotnet run --project Voxelforge.Benchmarks/Voxelforge.Benchmarks.csproj \
          --no-build --configuration Release \
          -- --bench-diff "$BASELINE" current/bench-sa-merlin.jsonl --threshold-percent 5.0
      output-path: current/*.jsonl
      timeout-minutes: 30

  fingerprint-rocket-rl10:
