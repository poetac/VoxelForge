# Dependabot config — voxelforge (issue #665).
#
# Repo posture before this file landed:
#   - 15 direct NuGet dependencies (one deliberate beta:
#     PublicApiAnalyzers 3.11.0-beta1 — bumped to 4.x in #584 then
#     held on 4.14.0 for the RS0017 false-positive fix; let Dependabot
#     propose 4.x.y bumps but expect the beta hold to need a manual
#     ignore once GA lands).
#   - 8 distinct GitHub Actions pinned by 40-char SHA via #664.
#
# What Dependabot adds:
#   - Weekly scan of NuGet + GitHub Actions for newer versions / CVEs.
#   - Auto-PR per ecosystem grouping minor + patch into a single PR
#     (major bumps go solo so they can be reviewed without churn).
#   - Open-PR cap of 5 per ecosystem keeps the queue manageable on a
#     solo-dev cadence.
#
# Vulnerability alerts (the no-PR signal that fires when a transitive
# dependency picks up a CVE) are enabled at the repo settings level
# (PATCH /vulnerability-alerts, also as part of #665).

version: 2

updates:
  # ── NuGet packages (all .csproj files under the repo root) ────────
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ecosystem:nuget"
    groups:
      # Bundle minor + patch updates so a single PR covers
      # routine bumps. Major bumps stay separate so each one
      # can be reviewed independently for breaking changes.
      nuget-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    # Ignore major bumps of CI-critical test infrastructure. These
    # consistently trip downstream NU1605 / xunit-analyzer compat
    # issues in auto-merge mode (see #718 / #720 / #721 / #723 / #724
    # close history) and want a coordinated upgrade PR per ecosystem
    # rather than scattered single-package bumps.
    ignore:
      - dependency-name: "Microsoft.NET.Test.Sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.CodeAnalysis.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "xunit"
        update-types: ["version-update:semver-major"]
      - dependency-name: "xunit.runner.visualstudio"
        update-types: ["version-update:semver-major"]
      - dependency-name: "coverlet.collector"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Avalonia*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      include: "scope"

  # ── GitHub Actions (workflow files under .github/workflows/) ──────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ecosystem:github-actions"
    groups:
      actions-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    # Ignore major bumps of the actions surface — same posture as the
    # NuGet ignore block above. Major action bumps consistently need
    # coordinated review (runner-version compatibility, API shape
    # changes, e.g. checkout v5→v6 Node-runtime jumps, upload-artifact
    # v4→v7 immutable-artifact + named-uploads model). Close history:
    # #730 (codeql 3→4), #732 (upload-artifact 4→7), #733
    # (configure-pages 5→6). Minor + patch bumps continue to land via
    # the group above.
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-dotnet"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/cache"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/configure-pages"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-pages-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/deploy-pages"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/github-script"
        update-types: ["version-update:semver-major"]
      - dependency-name: "github/codeql-action"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
